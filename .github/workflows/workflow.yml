name: Infra Workflow

on:
  push:

permissions:
  id-token: write
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      workflow: ${{ steps.filter.outputs.workflow }}
      vpc: ${{ steps.filter.outputs.vpc }}
      eks: ${{ steps.filter.outputs.eks }}
    steps:
      - uses: actions/checkout@v4 
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: | 
            workflow:
              - '.github/workflows/workflow.yml'
              - '.github/workflows/**/*'
            vpc:
              - 'terraform/vpc-infra/**/*'
            eks:
              - 'terraform/eks-infra/**/*'

  terraform:
    needs: changes
    strategy:
      matrix:
        BASE: [vpc-infra, eks-infra]
    if: |
      needs.changes.outputs.workflow == 'true' ||
      needs.changes.outputs.vpc == 'true' ||
      needs.changes.outputs.eks == 'true' ||
      github.ref == '/refs/heads/main'
    uses: ./.github/workflows/terraform.yml
    with:
      TF_ROOT: terraform/${{ matrix.BASE }}
