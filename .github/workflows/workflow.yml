name: Infra Workflow

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Run all environments regardless of detected changes'
        type: boolean
        default: false


permissions:
  id-token: write
  contents: read

jobs:
  # Detect changes in relevant directories
  changes:
    runs-on: ubuntu-latest
    outputs:
      workflow: ${{ steps.filter.outputs.workflow }}
      vpc-infra: ${{ steps.filter.outputs.vpc-infra }}
      eks-infra: ${{ steps.filter.outputs.eks-infra }}
    steps:
      - uses: actions/checkout@v4 
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          base: ${{ github.event.before != '0000000000000000000000000000000000000000' && github.event.before || 'main' }}
          filters: | 
            workflow:
              - '.github/workflows/workflow.yml'
              - '.github/workflows/**/*'
            vpc-infra:
              - 'terraform/vpc-infra/**/*'
            eks-infra:
              - 'terraform/eks-infra/**/*'

  # runs on every push and PR, when changes are detected in the relevant directories, or when force_all is true
  vpc_infra_tf_lint_validate:
    needs: changes
    if: |
      needs.changes.outputs.vpc-infra == 'true' ||
      github.event.inputs.force_all == 'true' 
    uses: ./.github/workflows/tf_lint_validate.yml
    with:
      TF_ROOT: terraform/vpc-infra

  # runs on every push and PR, when changes are detected in the relevant directories, or when force_all true
  eks_infra_tf_lint_validate:
    needs: changes
    if: |
      needs.changes.outputs.eks-infra == 'true' ||
      github.event.inputs.force_all == 'true' 
    uses: ./.github/workflows/tf_lint_validate.yml
    with:
      TF_ROOT: terraform/eks-infra

  # Plan-only, visible on every PR
  vpc_plan_pr:
    needs: [changes, vpc_infra_tf_lint_validate]
    if: | 
      needs.changes.outputs.vpc-infra == 'true' &&
      github.event_name == 'pull_request'
    uses: ./.github/workflows/tf_plan_apply.yml
    with:
      TF_ROOT: terraform/vpc-infra
      ENV: staging
      APPLY: false

  eks_plan_pr:
    needs: [changes, eks_infra_tf_lint_validate]
    if: | 
      needs.changes.outputs.eks-infra == 'true' && 
      github.event_name == 'pull_request'
    uses: ./.github/workflows/tf_plan_apply.yml
    with:
      TF_ROOT: terraform/eks-infra
      ENV: staging
      APPLY: false

  # Apply to staging, only once merged to main
  vpc_staging:
    needs: [changes, vpc_infra_tf_lint_validate]
    if: | 
      (needs.changes.outputs.vpc-infra == 'true' || github.event.inputs.force_all == 'true') && 
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && 
      github.ref == 'refs/heads/main'  
    uses: ./.github/workflows/tf_plan_apply.yml
    with:
      TF_ROOT: terraform/vpc-infra
      ENV: staging 
      APPLY: true

  eks_staging:
    needs: [changes, eks_infra_tf_lint_validate, vpc_staging]
    if: | 
      (needs.changes.outputs.eks-infra == 'true' || github.event.inputs.force_all == 'true') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && 
      github.ref == 'refs/heads/main' && 
      (needs.vpc_staging.result == 'success' || needs.vpc_staging.result == 'skipped')
    uses: ./.github/workflows/tf_plan_apply.yml
    with:
      TF_ROOT: terraform/eks-infra
      ENV: staging 
      APPLY: true

  # Apply to prod, only once staging succeeded on main
  vpc_prod:
    needs: [changes, vpc_staging]
    if: | 
      (needs.changes.outputs.vpc-infra == 'true' || github.event.inputs.force_all == 'true') &&  
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && 
      github.ref == 'refs/heads/main' &&
      (needs.vpc_staging.result == 'success' || needs.vpc_staging.result == 'skipped')
    uses: ./.github/workflows/tf_plan_apply.yml
    with:
      TF_ROOT: terraform/vpc-infra
      ENV: prod 
      APPLY: true

  eks_prod:
    needs: [changes, eks_staging, vpc_prod]
    if: | 
      (needs.changes.outputs.eks-infra == 'true' || github.event.inputs.force_all == 'true') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && 
      github.ref == 'refs/heads/main' &&
      (needs.eks_staging.result == 'success' || needs.eks_staging.result == 'skipped') && 
      (needs.vpc_prod.result == 'success' || needs.vpc_prod.result == 'skipped') 
    uses: ./.github/workflows/tf_plan_apply.yml
    with:
      TF_ROOT: terraform/eks-infra
      ENV: prod 
      APPLY: true
