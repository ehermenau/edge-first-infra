include:
  - local: .gitlab-ci/terraform.yml

variables:
  TF_ROOT: "vpc-infra"

tflint:
  extends: .tflint_base
  script:
    - cd terraform/vpc-infra/environments/${ENV}
    - tflint --init
    - tflint --recursive --format=compact

tf_validate:
  extends: .tf_validate

tf_plan:
  extends: .tf_plan

staging_apply:
  extends: .staging_apply

prod_apply:
  extends: .prod_apply
