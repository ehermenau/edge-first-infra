stages:
  - triggers

# Template for child triggers
.terraform_trigger:
  stage: triggers
  trigger:
    include: .gitlab/ci/tf-module-template.yml
    strategy: depend # Parent waits for child to succeed
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" # Trigger on any branch push
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" # Trigger on MRs

trigger-hub:
  extends: .terraform_trigger
  variables:
    TF_ROOT: "terraform/hub"
    TF_NAME: "hub"

trigger-hub-eks:
  extends: .terraform_trigger
  variables:
    TF_ROOT: "terraform/hub-eks"
    TF_NAME: "hub-eks"
  needs: ["trigger-hub"]
