stages:
  - triggers

trigger-vpc:
  stage: triggers
  trigger:
    include: terraform/vpc-infra/.gitlab-ci.yml
    strategy: depend
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - changes:
        - terraform/vpc-infra/**/*
