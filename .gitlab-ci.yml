workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

stages:
  - triggers

trigger-vpc:
  stage: triggers
  trigger:
    include: terraform/vpc-infra/.gitlab-ci.yml
    strategy: depend
  rules:
    - changes:
        - terraform/vpc-infra/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
