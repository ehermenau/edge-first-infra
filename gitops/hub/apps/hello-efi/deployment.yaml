apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-efi-config
  namespace: default
data:
  MESSAGE: "EFI Hub-to-Edge Connectivity Test: ONLINE"
  SPACE: "Interconnect-Blue"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-efi
  namespace: default
  labels:
    app: hello-efi
    Space: Blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-efi
  template:
    metadata:
      labels:
        app: hello-efi
    spec:
      containers:
      - name: web-server
        image: nginxdemos/hello:plain-text
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: hello-efi-config
        resources:
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: hello-efi-svc
  namespace: default
spec:
  selector:
    app: hello-efi
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
